<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Sedang Maintenance</title>

<!-- Google Fonts: Poppins (subset weight secukupnya) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ============================================
     ROOT VARIABLES
     ============================================ */
  :root{
    --yellow:#FFD54A;
    --yellow-dim:#E0AE2A;
    --black-1:#0F0F0F;
    --black-2:#171717;
    --grey:#9A9A9A;
    --white-1:#FAFAFA;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{ height:100%; }

  body{
    font-family:'Poppins', sans-serif;
    background:var(--black-1);
    color:var(--white-1);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    /* Background statis, hanya 2 radial gradient ringan (tanpa animasi background-position) */
    background-image:
      radial-gradient(circle at 15% 15%, rgba(255,213,74,0.10), transparent 42%),
      radial-gradient(circle at 85% 85%, rgba(255,213,74,0.08), transparent 45%);
  }

  /* ============================================
     SCROLLBAR KUNING (ringan, tanpa gradient animasi)
     ============================================ */
  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-track{ background:var(--black-1); }
  ::-webkit-scrollbar-thumb{ background:var(--yellow-dim); border-radius:8px; }
  ::-webkit-scrollbar-thumb:hover{ background:var(--yellow); }

  /* ============================================
     PARTIKEL CSS STATIS (maks 14 elemen, opacity+transform saja)
     Tidak ada JS, tidak ada box-shadow per partikel
     ============================================ */
  .particles{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
    pointer-events:none;
  }
  .particle{
    position:absolute;
    width:3px;
    height:3px;
    border-radius:50%;
    background:var(--yellow);
    opacity:0.5;
    will-change:transform;
    animation:floatUp 14s linear infinite;
  }
  @keyframes floatUp{
    0%{ transform:translateY(10vh); opacity:0; }
    12%{ opacity:0.55; }
    88%{ opacity:0.4; }
    100%{ transform:translateY(-100vh); opacity:0; }
  }
  /* Posisi & timing tiap partikel diatur manual (statis, ringan, tanpa JS loop) */
  .particle:nth-child(1){ left:4%;  animation-delay:0s;  }
  .particle:nth-child(2){ left:12%; animation-delay:2s;  }
  .particle:nth-child(3){ left:20%; animation-delay:5s;  }
  .particle:nth-child(4){ left:28%; animation-delay:1s;  }
  .particle:nth-child(5){ left:36%; animation-delay:7s;  }
  .particle:nth-child(6){ left:44%; animation-delay:3s;  }
  .particle:nth-child(7){ left:52%; animation-delay:9s;  }
  .particle:nth-child(8){ left:60%; animation-delay:4s;  }
  .particle:nth-child(9){ left:68%; animation-delay:6s;  }
  .particle:nth-child(10){ left:76%; animation-delay:8s; }
  .particle:nth-child(11){ left:84%; animation-delay:2.5s; }
  .particle:nth-child(12){ left:92%; animation-delay:10s; }
  .particle:nth-child(13){ left:50%; animation-delay:11s; }
  .particle:nth-child(14){ left:8%;  animation-delay:12s; }

  /* Sembunyikan partikel di layar kecil untuk hemat resource mobile */
  @media (max-width:600px){
    .particle:nth-child(n+9){ display:none; }
  }

  /* ============================================
     MAIN CARD - GLASSMORPHISM RINGAN
     backdrop-filter dipertahankan tipis (satu-satunya blur di halaman)
     ============================================ */
  .container{
    position:relative;
    z-index:1;
    width:100%;
    max-width:600px;
    animation:fadeIn 0.6s ease both;
  }
  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .card{
    padding:48px 38px;
    border-radius:24px;
    background:rgba(23,23,23,0.72);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,213,74,0.18);
    box-shadow:0 4px 24px rgba(0,0,0,0.35);
    text-align:center;
  }

  /* ============================================
     BADGE "Maintenance Mode" - pulse lambat & ringan (opacity only)
     ============================================ */
  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:7px 16px;
    border-radius:999px;
    background:rgba(255,213,74,0.08);
    border:1px solid rgba(255,213,74,0.3);
    color:var(--yellow);
    font-size:12px;
    font-weight:600;
    letter-spacing:0.5px;
    text-transform:uppercase;
    margin-bottom:26px;
  }
  .badge-dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--yellow);
    will-change:opacity;
    animation:pulseDot 2.6s ease-in-out infinite;
  }
  @keyframes pulseDot{
    0%,100%{ opacity:1; }
    50%{ opacity:0.35; }
  }

  /* ============================================
     GEAR ICON (SVG INLINE) - satu-satunya rotasi di halaman, lambat & halus
     ============================================ */
  .icon-wrap{
    width:96px;
    height:96px;
    margin:0 auto 28px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .gear-svg{
    will-change:transform;
    animation:spinGear 12s linear infinite;
  }
  @keyframes spinGear{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
  }

  /* ============================================
     TYPOGRAPHY (statis, tanpa animasi warna/background-position)
     ============================================ */
  h1{
    font-size:clamp(24px, 5vw, 34px);
    font-weight:700;
    letter-spacing:-0.4px;
    line-height:1.25;
    color:var(--white-1);
    margin-bottom:14px;
  }
  h1 span{ color:var(--yellow); }

  .subtitle{
    font-size:14.5px;
    font-weight:300;
    line-height:1.7;
    color:var(--grey);
    max-width:440px;
    margin:0 auto 24px;
  }

  /* Garis pembatas statis (tanpa shimmer) */
  .divider{
    height:1px;
    width:100%;
    margin:24px 0;
    background:rgba(255,255,255,0.08);
  }

  /* ============================================
     STATUS + loading dots (opacity only, ringan)
     ============================================ */
  .status{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    font-size:13px;
    font-weight:500;
    color:rgba(250,250,250,0.85);
    margin-bottom:20px;
  }
  .loading-dots span{
    animation:blink 1.4s infinite;
    opacity:0;
  }
  .loading-dots span:nth-child(1){ animation-delay:0s; }
  .loading-dots span:nth-child(2){ animation-delay:0.25s; }
  .loading-dots span:nth-child(3){ animation-delay:0.5s; }
  @keyframes blink{
    0%{ opacity:0; }
    25%{ opacity:1; }
    100%{ opacity:0; }
  }

  /* ============================================
     PROGRESS BAR - animasi transform (bukan left/width), GPU-friendly
     ============================================ */
  .progress-track{
    width:100%;
    height:7px;
    border-radius:999px;
    background:rgba(255,255,255,0.06);
    overflow:hidden;
    margin-bottom:30px;
    border:1px solid rgba(255,213,74,0.12);
  }
  .progress-bar{
    height:100%;
    width:40%;
    border-radius:999px;
    background:var(--yellow);
    will-change:transform;
    animation:progressMove 2.4s ease-in-out infinite;
  }
  @keyframes progressMove{
    0%{ transform:translateX(-120%); }
    50%{ transform:translateX(60%); }
    100%{ transform:translateX(250%); }
  }

  /* ============================================
     TOMBOL REFRESH - hover ringan (transform+opacity saja)
     ============================================ */
  .btn-refresh{
    display:inline-flex;
    align-items:center;
    gap:9px;
    padding:13px 32px;
    border:none;
    border-radius:12px;
    font-family:'Poppins', sans-serif;
    font-size:14px;
    font-weight:600;
    letter-spacing:0.3px;
    color:var(--black-1);
    background:var(--yellow);
    cursor:pointer;
    will-change:transform;
    transition:transform 0.25s ease, opacity 0.25s ease;
  }
  .btn-refresh:hover{ transform:translateY(-2px); opacity:0.92; }
  .btn-refresh:active{ transform:translateY(0); }
  .btn-refresh svg{ width:15px; height:15px; }

  .footnote{
    margin-top:24px;
    font-size:11.5px;
    font-weight:300;
    color:rgba(250,250,250,0.4);
    letter-spacing:0.3px;
  }

  /* ============================================
     REDUCED MOTION - matikan seluruh animasi non-esensial
     ============================================ */
  @media (prefers-reduced-motion: reduce){
    *{
      animation-duration:0.001ms !important;
      animation-iteration-count:1 !important;
      transition-duration:0.001ms !important;
    }
    .progress-bar{ transform:translateX(0); width:60%; }
    .particle{ display:none; }
  }

  /* ============================================
     RESPONSIVE
     ============================================ */
  @media (max-width:520px){
    .card{ padding:36px 22px; border-radius:20px; }
    .icon-wrap{ width:80px; height:80px; }
    .btn-refresh{ width:100%; justify-content:center; }
  }
</style>
</head>
<body>

  <!-- Partikel CSS statis, maksimal 14 elemen (disembunyikan sebagian di mobile) -->
  <div class="particles">
    <span class="particle"></span><span class="particle"></span><span class="particle"></span>
    <span class="particle"></span><span class="particle"></span><span class="particle"></span>
    <span class="particle"></span><span class="particle"></span><span class="particle"></span>
    <span class="particle"></span><span class="particle"></span><span class="particle"></span>
    <span class="particle"></span><span class="particle"></span>
  </div>

  <div class="container">
    <div class="card">

      <!-- Badge -->
      <div class="badge">
        <span class="badge-dot"></span>
        Maintenance Mode
      </div>

      <!-- Gear Icon (SVG Inline) -->
      <div class="icon-wrap">
        <svg class="gear-svg" width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7Z" stroke="#FFD54A" stroke-width="1.5"/>
          <path d="M19.4 13.5c.04-.33.06-.66.06-1s-.02-.67-.06-1l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.6-.22l-2.49 1a7.3 7.3 0 0 0-1.73-1l-.38-2.65A.5.5 0 0 0 14 2.5h-4a.5.5 0 0 0-.49.42l-.38 2.65c-.63.25-1.2.59-1.73 1l-2.49-1a.5.5 0 0 0-.6.22l-2 3.46a.5.5 0 0 0 .12.64L4.54 11.5c-.04.33-.06.66-.06 1s.02.67.06 1L2.43 15.15a.5.5 0 0 0-.12.64l2 3.46a.5.5 0 0 0 .6.22l2.49-1c.53.41 1.1.75 1.73 1l.38 2.65a.5.5 0 0 0 .49.42h4a.5.5 0 0 0 .49-.42l.38-2.65c.63-.25 1.2-.59 1.73-1l2.49 1a.5.5 0 0 0 .6-.22l2-3.46a.5.5 0 0 0-.12-.64L19.4 13.5Z" stroke="#E0AE2A" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </div>

      <!-- Title -->
      <h1>Website Sedang <span>Maintenance</span></h1>

      <!-- Subtitle -->
      <p class="subtitle">
        Kami sedang melakukan peningkatan sistem agar memberikan pengalaman yang lebih baik. Mohon tunggu beberapa saat.
      </p>

      <div class="divider"></div>

      <!-- Status -->
      <div class="status">
        🟡 System Upgrade in Progress
        <span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>
      </div>

      <!-- Progress bar -->
      <div class="progress-track">
        <div class="progress-bar"></div>
      </div>

      <!-- Refresh button -->
      <button class="btn-refresh" onclick="location.reload()">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 12a8 8 0 0 1 14-5.3M20 12a8 8 0 0 1-14 5.3" stroke="#0F0F0F" stroke-width="2" stroke-linecap="round"/>
          <path d="M18 4v4h-4M6 20v-4h4" stroke="#0F0F0F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Refresh Halaman
      </button>

      <p class="footnote">Terima kasih atas pengertiannya.</p>

    </div>
  </div>

</body>
</html>
